<style>
  :root{
    --bg: #062030;
    --text: #f3eded;
    --accent: #0e052e;     /* color al hacer hover */
    --accent-contrast: #fff;
    --border: #080808;     /* color de los bordes entre items */
    --radius: 18px;
  }

  /* Reset mínimo */
  * { box-sizing: border-box; margin: 0; padding: 0; }

 

  /* Contenedor del nav */
  .nav {
    display: flex;
    justify-content: center; /* centra horizontalmente la barra */
  }

  /* Lista horizontal */
  .nav__list {
    display: flex;
    gap: 0; /* usaremos bordes entre items en lugar de gap */
    background: blue;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(230, 222, 222, 0.03);
  }

  /* Cada item visualmente separado por un borde vertical */
  .nav__item {
    list-style: none;
    border-left: 1px solid var(--border); /* borde entre items */
  }

  /* Evitar borde en el primer item */
  .nav__item:first-child {
    border-left: none;
  }

  /* Enlace estilo botón */
  .nav__link {
    display: block;
    padding: 12px 20px;
    text-decoration: none;
    color: var(--text);
    font-weight: 600;
    transition: background-color 180ms ease, color 180ms ease, transform 120ms ease;
    user-select: none;
  }

  /* Hover / focus (accesible) */
  .nav__link:hover,
  .nav__link:focus {
    background: var(--accent);
    color: var(--accent-contrast);
    outline: none;
    transform: translateY(-2px);
  }

  /* Indicar foco con teclado */
  .nav__link:focus-visible {
    box-shadow: 0 0 0 3px rgba(14,165,164,.15);
    border-radius: 6px;
  }

  /* Responsive: en pantallas muy pequeñas apilar verticalmente */
  @media (max-width: 520px) {
    .nav__list {
      flex-direction: column;
      width: 100%;
      max-width: 360px;
    }
    .nav__item {
      border-left: none;
      border-top: 1px solid var(--border);
    }
    .nav__item:first-child {
      border-top: none;
    }
    .nav__link {
      padding: 14px 18px;
    }
  }
</style>
</head>
