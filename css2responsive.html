<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba css</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #062030;
      --text: #f3eded;
      --accent: #0e052e;
      --accent-contrast: #fff;
      --border: #080808;
      --radius: 18px;
      --header-height: 300px;
    }

    /* Reset mínimo */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: radial-gradient(circle, #0077ea, #1f4f96, #1b2949, #000);
      color: #333;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      position: relative;
      margin-bottom: 30px;
      background: radial-gradient(circle, #0077ea, #1f4f96, #1b2949, #000);
    }

    /* Contenedor del nav */
    .nav {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      position: relative;
      z-index: 10;
    }

    /* Lista horizontal */
    .nav__list {
      display: flex;
      gap: 0;
      background: blue;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(230, 222, 222, 0.03);
    }

    /* Cada item visualmente separado por un borde vertical */
    .nav__item {
      list-style: none;
      border-left: 1px solid var(--border);
    }

    /* Evitar borde en el primer item */
    .nav__item:first-child {
      border-left: none;
    }

    /* Enlace estilo botón */
    .nav__link {
      display: block;
      padding: 12px 20px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      transition: background-color 180ms ease, color 180ms ease, transform 120ms ease;
      user-select: none;
    }

    /* Hover / focus (accesible) */
    .nav__link:hover,
    .nav__link:focus {
      background: var(--accent);
      color: var(--accent-contrast);
      outline: none;
      transform: translateY(-2px);
    }

    /* Indicar foco con teclado */
    .nav__link:focus-visible {
      box-shadow: 0 0 0 3px rgba(14,165,164,.15);
      border-radius: 6px;
    }

    .stage {
      height: var(--header-height);
      width: 100%;
      margin: 0 auto;
      position: relative;
      perspective: 9999px;
      transform-style: preserve-3d;
    }

    .layer {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
      animation: ಠ_ಠ 5s infinite alternate ease-in-out -7.5s;
      animation-fill-mode: forwards;
      transform: rotateY(40deg) rotateX(33deg) translateZ(0);
    }

    .layer:after {
      font: 150px/0.65 "Pacifico", "Kaushan Script", Futura, "Roboto", "Trebuchet MS", Helvetica, sans-serif;
      content: "Claudio Isaias\a   Huancahuire Bravo!";
      white-space: pre;
      text-align: center;
      height: 100%;
      width: 100%;
      position: absolute;
      top: 50px;
      color: whitesmoke;
      letter-spacing: -2px;
      text-shadow: 4px 0 10px rgba(0, 0, 0, 0.13);
    }

    .layer:nth-child(1):after { transform: translateZ(0px); }
    .layer:nth-child(2):after { transform: translateZ(-1.5px); }
    .layer:nth-child(3):after { transform: translateZ(-3px); }
    .layer:nth-child(4):after { transform: translateZ(-4.5px); }
    .layer:nth-child(5):after { transform: translateZ(-6px); }
    .layer:nth-child(6):after { transform: translateZ(-7.5px); }
    .layer:nth-child(7):after { transform: translateZ(-9px); }
    .layer:nth-child(8):after { transform: translateZ(-10.5px); }
    .layer:nth-child(9):after { transform: translateZ(-12px); }
    .layer:nth-child(10):after { transform: translateZ(-13.5px); }
    .layer:nth-child(11):after { transform: translateZ(-15px); }
    .layer:nth-child(12):after { transform: translateZ(-16.5px); }
    .layer:nth-child(13):after { transform: translateZ(-18px); }
    .layer:nth-child(14):after { transform: translateZ(-19.5px); }
    .layer:nth-child(15):after { transform: translateZ(-21px); }
    .layer:nth-child(16):after { transform: translateZ(-22.5px); }
    .layer:nth-child(17):after { transform: translateZ(-24px); }
    .layer:nth-child(18):after { transform: translateZ(-25.5px); }
    .layer:nth-child(19):after { transform: translateZ(-27px); }
    .layer:nth-child(20):after { transform: translateZ(-28.5px); }

    .layer:nth-child(n+10):after {
      -webkit-text-stroke: 3px rgba(0, 0, 0, 0.25);
    }

    .layer:nth-child(n+11):after {
      -webkit-text-stroke: 15px dodgerblue;
      text-shadow: 6px 0 6px #00366b, 5px 5px 5px #002951, 0 6px 6px #00366b;
    }

    .layer:nth-child(n+12):after {
      -webkit-text-stroke: 15px #0077ea;
    }

    .layer:last-child:after {
      -webkit-text-stroke: 17px rgba(0, 0, 0, 0.1);
    }

    .layer:first-child:after {
      color: #fff;
      text-shadow: none;
    }

    @keyframes ಠ_ಠ {
      100% {
        transform: rotateY(-40deg) rotateX(-43deg);
      }
    }

    .gradient-examples {
      display: grid;
      gap: 1rem;
      grid-template-rows: repeat(1, 1fr);
      margin: 30px auto;
      max-width: 800px;
      padding: 1rem;
    }

    @media (min-width: 600px) {
      .gradient-examples {
        grid-template-columns: repeat(1, 1fr);
      }
    }

    .example {
      align-items: center;
      border-radius: 16px;
      box-shadow: 0 0 15px hsla(0deg, 0%, 0%, 0.5);
      color: #fff;
      font-size: 1.25rem;
      font-weight: 900;
      display: flex;
      min-height: 200px;
      height: auto;
      justify-content: center;
      text-shadow: 0 2px 3px hsla(0deg, 0%, 0%, 0.25);
      padding: 20px;
      text-align: center;
    }

    .linear {
      background-image: linear-gradient(#080874, #050505);
    }

    .radial {
      background-image: radial-gradient(#080874, #050505);
    }

    .conic {
      background-image: conic-gradient(#080874, #050505);
    }

    h1 {
      color: white;
      text-align: center;
      margin: 20px 0;
    }

    .vibrate-3 {
      -webkit-animation: vibrate-3 0.5s cubic-bezier(0.950, 0.050, 0.795, 0.035) infinite both;
      animation: vibrate-3 0.5s cubic-bezier(0.950, 0.050, 0.795, 0.035) infinite both;
    }

    .rotate-scale-up {
      -webkit-animation: rotate-scale-up 0.65s linear both;
      animation: rotate-scale-up 0.65s linear both;
    }

    footer {
      text-align: center;
      padding: 30px 15px;
      background: radial-gradient(circle, #0077ea, #1f4f96, #1b2949, #000);
      color: #fff;
      margin-top: 40px;
      border-radius: 8px;
    }

    footer h1 {
      margin-bottom: 20px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
    }

    .fa-whatsapp {
      font-size: 40px;
      color: green;
    }

    .fa-github {
      font-size: 40px;
      color: white;
    }

    /* Animaciones */
    @-webkit-keyframes vibrate-3 {
      0% { -webkit-transform: translate(0); transform: translate(0); }
      10% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      20% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      30% { -webkit-transform: translate(-2px, 2px); transform: translate(-2px, 2px); }
      40% { -webkit-transform: translate(2px, 2px); transform: translate(2px, 2px); }
      50% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      60% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      70% { -webkit-transform: translate(-2px, 2px); transform: translate(-2px, 2px); }
      80% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      90% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      100% { -webkit-transform: translate(0); transform: translate(0); }
    }

    @keyframes vibrate-3 {
      0% { -webkit-transform: translate(0); transform: translate(0); }
      10% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      20% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      30% { -webkit-transform: translate(-2px, 2px); transform: translate(-2px, 2px); }
      40% { -webkit-transform: translate(2px, 2px); transform: translate(2px, 2px); }
      50% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      60% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      70% { -webkit-transform: translate(-2px, 2px); transform: translate(-2px, 2px); }
      80% { -webkit-transform: translate(-2px, -2px); transform: translate(-2px, -2px); }
      90% { -webkit-transform: translate(2px, -2px); transform: translate(2px, -2px); }
      100% { -webkit-transform: translate(0); transform: translate(0); }
    }

    @-webkit-keyframes rotate-scale-up {
      0% { -webkit-transform: scale(1) rotateZ(0); transform: scale(1) rotateZ(0); }
      50% { -webkit-transform: scale(2) rotateZ(180deg); transform: scale(2) rotateZ(180deg); }
      100% { -webkit-transform: scale(1) rotateZ(360deg); transform: scale(1) rotateZ(360deg); }
    }

    @keyframes rotate-scale-up {
      0% { -webkit-transform: scale(1) rotateZ(0); transform: scale(1) rotateZ(0); }
      50% { -webkit-transform: scale(2) rotateZ(180deg); transform: scale(2) rotateZ(180deg); }
      100% { -webkit-transform: scale(1) rotateZ(360deg); transform: scale(1) rotateZ(360deg); }
    }

    /* RESPONSIVE DESIGN */
    /* Para tablets */
    @media (max-width: 1024px) {
      .stage {
        height: 250px;
      }
      
      .layer:after {
        font-size: 120px;
        top: 40px;
      }
      
      .gradient-examples {
        margin: 20px auto;
      }
    }

    /* Para móviles grandes */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
      
      .stage {
        height: 200px;
      }
      
      .layer:after {
        font-size: 90px;
        top: 30px;
      }
      
      .example {
        font-size: 1.1rem;
        min-height: 150px;
        padding: 15px;
      }
      
      h1 {
        font-size: 1.8rem;
      }
    }

    /* Para móviles medianos */
    @media (max-width: 600px) {
      .stage {
        height: 150px;
      }
      
      .layer:after {
        font-size: 60px;
        top: 25px;
      }
      
      .nav__list {
        flex-direction: column;
        width: 100%;
        max-width: 360px;
      }
      
      .nav__item {
        border-left: none;
        border-top: 1px solid var(--border);
      }
      
      .nav__item:first-child {
        border-top: none;
      }
      
      .nav__link {
        padding: 14px 18px;
        text-align: center;
      }
      
      .gradient-examples {
        padding: 0.5rem;
      }
      
      .example {
        font-size: 1rem;
        min-height: 120px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .social-icons {
        gap: 20px;
      }
      
      .fa-whatsapp, .fa-github {
        font-size: 35px;
      }
    }

    /* Para móviles pequeños */
    @media (max-width: 480px) {
      .stage {
        height: 120px;
      }
      
      .layer:after {
        font-size: 40px;
        top: 20px;
        content: "Claudio Isaias\aHuancahuire!";
      }
      
      .example {
        min-height: 100px;
        padding: 10px;
        font-size: 0.9rem;
      }
      
      h1 {
        font-size: 1.3rem;
        margin: 15px 0;
      }
      
      footer {
        padding: 20px 10px;
      }
      
      .social-icons {
        gap: 15px;
      }
      
      .fa-whatsapp, .fa-github {
        font-size: 30px;
      }
    }

    /* Para dispositivos muy pequeños */
    @media (max-width: 360px) {
      .stage {
        height: 100px;
      }
      
      .layer:after {
        font-size: 32px;
        top: 15px;
      }
      
      .nav__link {
        padding: 12px 15px;
        font-size: 0.9rem;
      }
      
      .example {
        min-height: 90px;
        font-size: 0.8rem;
      }
      
      h1 {
        font-size: 1.2rem;
      }
    }

    /* Ajustar animaciones en dispositivos con preferencia de reducción de movimiento */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      
      .vibrate-3,
      .rotate-scale-up {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="stage">
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
    </div>

    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a class="nav__link" href="index.html">Maquetación</a></li>
        <li class="nav__item"><a class="nav__link" href="css3responsive.html">CSS 3</a></li>
        <li class="nav__item"><a class="nav__link" href="css2responsive.html">CSS3</a></li>
        <li class="nav__item"><a class="nav__link" href="css1responsive.html">CSS</a></li>
        <li class="nav__item"><a class="nav__link" href="javascriptresponsive.html">JavaScript</a></li>
      </ul>
    </nav>
  </header>

  <div class="gradient-examples">
    <h1 class="vibrate-3">Sobre mi</h1>
    <div class="vibrate-3 example linear">
      <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Obcaecati eligendi saepe natus distinctio in ipsum, dolorem suscipit ex quasi?</p>
    </div>
  </div>
  <br>

  <div class="gradient-examples">
    <h1 class="rotate-scale-up">Proyectos</h1> 
    <div class="rotate-scale-up example radial">
      Radial Gradient
    </div>
  </div>
  <br>

  <div class="gradient-examples">
    <div class="example conic">
      Conic Gradient
    </div>
  </div>

  <footer>
    <h1>Contacto</h1>
    <div class="social-icons">
      <a href="https://wa.me/51983744950" target="_blank" aria-label="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i> 
      </a>
      <a href="https://github.com/" target="_blank" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
    </div>
  </footer>

  <script>
    // Detectar si el usuario prefiere movimiento reducido
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
    
    if (reduceMotion.matches) {
      document.querySelectorAll('[class*="vibrate"], [class*="rotate"]').forEach(el => {
        el.style.animation = 'none';
      });
    }
  </script>
</body>
</html>
